name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.3"
          elixir-version: "1.18.3"
          gleam-version: "1.16.0"
          rebar3-version: "3"
      - run: mix deps.get
      - run: mix format --check-formatted
      - run: mix test
